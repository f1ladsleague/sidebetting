<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Lads League | Side Bets</title>
    <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --theme-color: #e10600; --f1-dark: #15151e; --f1-card: #1f1f27; --f1-hover: #2a2a35; }
        
        body { font-family: 'Titillium Web', sans-serif; background-color: var(--f1-dark); color: #fff; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: var(--f1-card); width: 100%; max-width: 600px; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        h1 { text-align: center; border-bottom: 2px solid var(--theme-color); padding-bottom: 10px; text-transform: uppercase; font-weight: 700; margin-bottom: 5px; transition: border-color 0.3s ease; }
        .round-info { text-align: center; color: #aaa; font-size: 18px; margin-top: 0; margin-bottom: 20px; font-weight: 600; }
        h2 { color: #ccc; font-weight: 600; font-size: 20px; text-align: center; }
        
        select, input[type="password"] { width: 100%; padding: 12px; margin: 10px 0 20px 0; background: var(--f1-hover); border: 1px solid #444; color: white; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
        select:focus, input:focus { outline: none; border-color: var(--theme-color); }
        
        button.btn-primary { width: 100%; background: var(--theme-color); color: white; border: none; padding: 15px; font-size: 18px; font-weight: 700; border-radius: 6px; cursor: pointer; text-transform: uppercase; transition: 0.3s ease; }
        button.btn-primary:hover { filter: brightness(1.2); transform: translateY(-2px); }
        button:disabled { background: #555 !important; cursor: not-allowed; transform: none; color: #aaa; filter: none; }
        
        .hidden { display: none !important; }
        .race-section { background: #1a1a21; padding: 20px; border-radius: 8px; margin-bottom: 25px; border: 1px solid #333; }
        
        .driver-option { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: var(--f1-hover); border: 2px solid transparent; border-radius: 8px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; font-size: 18px; font-weight: 600; }
        .driver-option:hover { border-color: #555; }
        .driver-option:has(input:checked) { border-color: var(--theme-color); background: color-mix(in srgb, var(--theme-color) 15%, transparent); }
        .driver-option input { display: none; } 
        
        .price-tag { background: #000; padding: 4px 10px; border-radius: 4px; color: #00ff00; font-weight: 700; margin-left: auto; }
        .bet-badge { background: #444; color: #fff; padding: 3px 8px; border-radius: 12px; font-size: 13px; font-weight: 600; margin-left: 10px; display: inline-flex; align-items: center; }
        
        .pot-display { background: rgba(255,255,255,0.05); border: 1px solid var(--theme-color); border-radius: 6px; padding: 10px; text-align: center; font-size: 20px; font-weight: bold; margin-bottom: 15px; color: #fff; transition: border-color 0.3s ease; }
        .pot-display span { color: #00ff00; }

        .clear-btn { background: transparent; color: #aaa; border: 1px solid #aaa; padding: 8px 15px; border-radius: 4px; cursor: pointer; display: block; margin: 15px auto 0 auto; transition: 0.2s; }
        .clear-btn:hover { background: #aaa; color: #000; }

        .dashboard-metrics { background: #1a1a21; border: 1px solid #333; padding: 15px; border-radius: 8px; margin-bottom: 25px; text-align: center; }
        .metric-title { color: #aaa; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .metric-value { font-size: 24px; font-weight: bold; margin: 0; }
    </style>
</head>
<body>

<div class="container" id="login-section">
    <h1>F1 Lads League</h1>
    <p class="round-info" id="login-round-text">Loading Session...</p>
    <h2>Constructor Login</h2>
    <select id="constructor-select"><option value="">Select your Team...</option></select>
    <input type="password" id="password-input" placeholder="Enter Password">
    <button class="btn-primary" onclick="login()">Enter Paddock</button>
</div>

<div class="container hidden" id="betting-section">
    <h1>Manage Your Bets</h1>
    <p class="round-info" id="betting-round-text"></p>
    
    <h2 id="welcome-message" style="color: var(--theme-color); margin-bottom: 20px;"></h2>

    <div class="dashboard-metrics">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div>
                <div class="metric-title">Current Budget Cap</div>
                <div class="metric-value" id="budget-cap-display">$0</div>
            </div>
            <div>
                <div class="metric-title">Season Side Bets</div>
                <div class="metric-value" id="net-win-loss-display">$0</div>
            </div>
        </div>
    </div>

    <form id="bet-form">
        <p style="text-align: center; color: #aaa; margin-bottom: 30px;">Select ONE driver for the Sprint and/or ONE for the Feature. You may change them until the day before the race.</p>
        
        <div class="race-section">
            <h2 style="color: white; margin-top: 0;">Sprint Race</h2>
            <div class="pot-display">Live Pot: <span id="sprint-pot-total">$0</span></div>
            <div id="sprint-drivers"></div>
            <button type="button" class="clear-btn" onclick="clearSelection('sprint-driver')">Clear Sprint</button>
        </div>

        <div class="race-section">
            <h2 style="color: white; margin-top: 0;">Feature Race</h2>
            <div class="pot-display">Live Pot: <span id="feature-pot-total">$0</span></div>
            <div id="feature-drivers"></div>
            <button type="button" class="clear-btn" onclick="clearSelection('feature-driver')">Clear Feature</button>
        </div>

        <button type="submit" class="btn-primary" id="submit-btn">Submit Bets</button>
        <button type="button" class="clear-btn" style="margin-top:20px; width:100%" onclick="returnHome()">Cancel / Return Home</button>
    </form>
</div>

<script>
    const GOOGLE_SCRIPT_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzl82qkQw4mf_dFbV6ExR0Va3JRLGUQ7bOPN2oy0yPUateuocYtELzgF9HpQ9GnGGB4uw/exec";
    const SETTINGS_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTZKLukYpw5VzMfRbfXh80lj1B0gbUiVx_CoinOMVb-b2iFEMiWg_nW3KcMp88qKL3UfctvzYgEN_Lg/pub?gid=2057582908&single=true&output=csv";
    const CONSTRUCTORS_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTZKLukYpw5VzMfRbfXh80lj1B0gbUiVx_CoinOMVb-b2iFEMiWg_nW3KcMp88qKL3UfctvzYgEN_Lg/pub?gid=1589744882&single=true&output=csv";
    const DRIVERS_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTZKLukYpw5VzMfRbfXh80lj1B0gbUiVx_CoinOMVb-b2iFEMiWg_nW3KcMp88qKL3UfctvzYgEN_Lg/pub?gid=1372542075&single=true&output=csv";
    const BETS_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTZKLukYpw5VzMfRbfXh80lj1B0gbUiVx_CoinOMVb-b2iFEMiWg_nW3KcMp88qKL3UfctvzYgEN_Lg/pub?gid=80994690&single=true&output=csv";

    let constructorsData = [];
    let currentConstructor = "";
    let currentRound = "";
    let nextRaceDate = "";
    let sprintRollover = 0;
    let featureRollover = 0;
    let hasExistingBets = false;

    let sprintBetCounts = {};
    let featureBetCounts = {};

    // BULLETPROOF CSV PARSER: Strips hidden \r characters that break logic
    async function fetchCSV(url) {
        const response = await fetch(url);
        const text = await response.text();
        const cleanText = text.replace(/\r/g, ''); 
        return cleanText.split('\n').map(row => row.split(',').map(item => item.trim())).slice(1);
    }

    function parseDateString(dateStr) {
        let cleanDate = dateStr.trim().replace(/-/g, '/');
        if (cleanDate.includes('/')) {
            const parts = cleanDate.split('/');
            const day = parseInt(parts[0], 10);
            const month = parseInt(parts[1], 10) - 1; 
            let year = parseInt(parts[2], 10);
            if (year < 100) year += 2000; 
            return new Date(year, month, day);
        } else {
            return new Date(dateStr);
        }
    }

    window.onload = async () => {
        try {
            const settingsData = await fetchCSV(SETTINGS_CSV_URL);
            if(settingsData.length > 0) {
                currentRound = String(settingsData[0][0]).trim();
                nextRaceDate = String(settingsData[0][1]).trim();
                sprintRollover = parseFloat(settingsData[0][2] || 0);
                featureRollover = parseFloat(settingsData[0][3] || 0);

                let displayDate = nextRaceDate;
                try {
                    const raceDateObj = parseDateString(nextRaceDate);
                    const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
                    displayDate = `${raceDateObj.getDate()} ${monthNames[raceDateObj.getMonth()]} ${raceDateObj.getFullYear()}`;
                } catch(e) {}

                const headerText = `Round ${currentRound} | Next Race: ${displayDate}`;
                document.getElementById('login-round-text').innerText = headerText;
                document.getElementById('betting-round-text').innerText = headerText;
            }

            constructorsData = await fetchCSV(CONSTRUCTORS_CSV_URL);
            const constructorSelect = document.getElementById('constructor-select');
            constructorsData.forEach(c => {
                if(c[0]) constructorSelect.innerHTML += `<option value="${c[0]}">${c[0]}</option>`;
            });

            // LIVE POTS & BET COUNTERS
            let liveSprintPot = sprintRollover;
            let liveFeaturePot = featureRollover;
            
            try {
                const allBetsData = await fetchCSV(BETS_CSV_URL);
                const currentBets = allBetsData.filter(b => b[1] && String(b[1]).trim() === currentRound);
                
                currentBets.forEach(bet => {
                    const raceType = String(bet[3]).trim().toLowerCase();
                    const driver = String(bet[4]).trim();
                    const amount = parseFloat(bet[5] || 0);
                    
                    if(raceType === 'sprint') {
                        liveSprintPot += amount;
                        sprintBetCounts[driver] = (sprintBetCounts[driver] || 0) + 1;
                    } else if(raceType === 'feature') {
                        liveFeaturePot += amount;
                        featureBetCounts[driver] = (featureBetCounts[driver] || 0) + 1;
                    }
                });
            } catch(e) { console.error("Could not load bets.", e); }

            document.getElementById('sprint-pot-total').innerText = `$${liveSprintPot.toFixed(2)}`;
            document.getElementById('feature-pot-total').innerText = `$${liveFeaturePot.toFixed(2)}`;

            let driversData = await fetchCSV(DRIVERS_CSV_URL);
            driversData = driversData.filter(d => d[0]); 
            
            const sprintSorted = [...driversData].sort((a, b) => Number(b[1]) - Number(a[1]));
            const featureSorted = [...driversData].sort((a, b) => Number(b[2]) - Number(a[2]));

            const sprintDiv = document.getElementById('sprint-drivers');
            sprintSorted.forEach(d => {
                const driverName = String(d[0]).trim();
                const count = sprintBetCounts[driverName] || 0;
                const badge = count > 0 ? `<span class="bet-badge">👤 ${count}</span>` : "";
                
                sprintDiv.innerHTML += `
                    <label class="driver-option">
                        <span>${driverName} ${badge}</span>
                        <span class="price-tag">$${d[1]}</span>
                        <input type="radio" name="sprint-driver" value="${driverName}" data-amount="${d[1]}">
                    </label>`;
            });

            const featureDiv = document.getElementById('feature-drivers');
            featureSorted.forEach(d => {
                const driverName = String(d[0]).trim();
                const count = featureBetCounts[driverName] || 0;
                const badge = count > 0 ? `<span class="bet-badge">👤 ${count}</span>` : "";

                featureDiv.innerHTML += `
                    <label class="driver-option">
                        <span>${driverName} ${badge}</span>
                        <span class="price-tag">$${d[2]}</span>
                        <input type="radio" name="feature-driver" value="${driverName}" data-amount="${d[2]}">
                    </label>`;
            });
        } catch (error) {
            document.getElementById('login-round-text').innerText = "System Offline - Could not fetch data";
        }
    };

    function applyTeamTheme(teamName) {
        let themeColor = "#e10600"; 
        const nameLower = teamName.toLowerCase();
        
        if (nameLower.includes("mercedes")) themeColor = "#00D7B6";
        else if (nameLower.includes("red bull") || nameLower.includes("redbull")) themeColor = "#4781D7";
        else if (nameLower.includes("ferrari")) themeColor = "#ED1131";
        else if (nameLower.includes("mclaren")) themeColor = "#F47600";
        else if (nameLower.includes("aston martin") || nameLower.includes("astonmartin")) themeColor = "#229971";

        document.documentElement.style.setProperty('--theme-color', themeColor);
    }

    async function login() {
        const selected = document.getElementById('constructor-select').value;
        const pass = document.getElementById('password-input').value;
        const team = constructorsData.find(c => String(c[0]).trim() === selected);
        
        if (team && String(team[1]).trim() === pass) {
            currentConstructor = selected;
            applyTeamTheme(selected);

            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('betting-section').classList.remove('hidden');
            document.getElementById('welcome-message').innerText = `${selected}`;
            
            // Reads from Column F (Index 5) for Budget Cap
            document.getElementById('budget-cap-display').innerText = `$${team[5] || "0"}`;
            
            // Reads from Column G (Index 6) for Net Win/Loss
            const netValue = parseFloat((team[6] || "0").replace(/[^0-9.-]+/g,""));
            const netDisplay = document.getElementById('net-win-loss-display');
            if (netValue > 0) {
                netDisplay.innerText = `+$${netValue}`;
                netDisplay.style.color = "#00ff00";
            } else if (netValue < 0) {
                netDisplay.innerText = `-$${Math.abs(netValue)}`;
                netDisplay.style.color = "#ff3333";
            } else {
                netDisplay.innerText = `$0`;
                netDisplay.style.color = "#fff";
            }

            await populateExistingBets();
        } else {
            alert("Incorrect constructor or password!");
        }
    }

    async function populateExistingBets() {
        try {
            const betsData = await fetchCSV(BETS_CSV_URL);
            
            // Bulletproof matching filter
            const myBets = betsData.filter(b => 
                b[1] && String(b[1]).trim() === currentRound && 
                b[2] && String(b[2]).trim() === currentConstructor
            );
            
            const submitBtn = document.getElementById('submit-btn');
            
            hasExistingBets = myBets.length > 0;
            submitBtn.innerText = hasExistingBets ? "Update Bets" : "Submit Bets";

            myBets.forEach(bet => {
                const raceType = String(bet[3]).trim().toLowerCase();
                const driver = String(bet[4]).trim();   
                
                if (raceType === 'sprint') {
                    const radio = document.querySelector(`input[name="sprint-driver"][value="${driver}"]`);
                    if (radio) radio.checked = true;
                } else if (raceType === 'feature') {
                    const radio = document.querySelector(`input[name="feature-driver"][value="${driver}"]`);
                    if (radio) radio.checked = true;
                }
            });

            const raceDate = parseDateString(nextRaceDate);
            const today = new Date();
            const deadline = new Date(raceDate);
            deadline.setDate(deadline.getDate() - 1);
            deadline.setHours(23, 59, 59);

            if (today > deadline) {
                submitBtn.disabled = true;
                submitBtn.innerText = "Bets Locked (Deadline Passed)";
                document.querySelectorAll('input[type="radio"]').forEach(r => r.disabled = true);
            }

        } catch(e) { console.error("Error highlighting existing bets.", e); }
    }

    function returnHome() {
        document.getElementById('betting-section').classList.add('hidden');
        document.getElementById('login-section').classList.remove('hidden');
        document.getElementById('password-input').value = ""; 
        document.getElementById('constructor-select').value = ""; 
        document.documentElement.style.setProperty('--theme-color', '#e10600'); 
        document.querySelectorAll('input[type="radio"]').forEach(r => r.checked = false);
    }

    function clearSelection(radioName) {
        document.querySelectorAll(`input[name="${radioName}"]`).forEach(r => r.checked = false);
    }

    const sendBet = async (raceType, selectedElement) => {
        const formData = new URLSearchParams();
        formData.append('round', currentRound);
        formData.append('constructor', currentConstructor);
        formData.append('raceType', raceType);
        formData.append('driver', selectedElement.value);
        formData.append('amount', selectedElement.getAttribute('data-amount'));

        return fetch(GOOGLE_SCRIPT_WEB_APP_URL, { 
            method: 'POST', 
            body: formData,
            mode: 'no-cors'
        });
    };

    document.getElementById('bet-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const submitBtn = document.getElementById('submit-btn');
        submitBtn.innerText = "Processing...";
        submitBtn.disabled = true;

        const sprintSelected = document.querySelector('input[name="sprint-driver"]:checked');
        const featureSelected = document.querySelector('input[name="feature-driver"]:checked');

        if (!sprintSelected && !featureSelected) {
            alert("You must select at least one driver to bet on!");
            submitBtn.innerText = hasExistingBets ? "Update Bets" : "Submit Bets";
            submitBtn.disabled = false;
            return;
        }

        try {
            const promises = [];
            if (sprintSelected) promises.push(sendBet('Sprint', sprintSelected));
            if (featureSelected) promises.push(sendBet('Feature', featureSelected));
            
            await Promise.all(promises);
            
            setTimeout(() => {
                alert(`Bets successfully logged for Round ${currentRound}! Good luck.`);
                window.location.reload(); 
            }, 800);
            
        } catch (error) {
            alert("Connection error. Try again.");
            submitBtn.innerText = hasExistingBets ? "Update Bets" : "Submit Bets";
            submitBtn.disabled = false;
        }
    });
</script>
</body>
</html>
